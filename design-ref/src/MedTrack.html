<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MedTrack — Patient App</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="app/styles.css" />
<style>
  html, body { margin: 0; height: 100%; }
  body {
    background: #E7EBE9;
    background-image: radial-gradient(1200px 600px at 78% -10%, #EEF2F0, #E2E7E4);
    font-family: "Plus Jakarta Sans", system-ui, sans-serif;
    color: #14211d;
    min-height: 100%;
  }
  #root { min-height: 100vh; }
  .stage {
    display: flex; align-items: center; justify-content: center; gap: 56px;
    min-height: 100vh; padding: 48px 40px; box-sizing: border-box; flex-wrap: wrap;
  }
  .device-wrap { flex: none; }

  /* ---- Review panel ---- */
  .rev {
    width: 300px; flex: none; align-self: center;
    display: flex; flex-direction: column; gap: 22px;
    color: #2b3a34;
  }
  .rev-brand { display: flex; align-items: center; gap: 12px; }
  .rev-logo {
    width: 42px; height: 42px; border-radius: 13px; background: #0F6E56; color: #fff;
    display: flex; align-items: center; justify-content: center; font-size: 20px; flex: none;
    box-shadow: 0 6px 18px -6px rgba(15,110,86,.6);
  }
  .rev-name { font-size: 17px; font-weight: 500; letter-spacing: -0.02em; }
  .rev-sub { font-size: 12px; color: #6a7a73; }
  .rev-block { display: flex; flex-direction: column; gap: 10px; }
  .rev-h { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; color: #7a8a83; display: flex; align-items: center; gap: 8px; }
  .rev-tag { background: #d9e7e1; color: #0F6E56; font-size: 9px; padding: 2px 6px; border-radius: 5px; letter-spacing: 0.04em; }
  .rev-seg { display: flex; gap: 4px; background: #fff; border: 1px solid #dde5e1; border-radius: 12px; padding: 4px; }
  .rev-seg button {
    flex: 1; border: none; background: none; cursor: pointer; font-family: inherit;
    font-size: 13px; font-weight: 500; color: #5a6b64; padding: 9px 4px; border-radius: 9px; transition: .18s;
  }
  .rev-seg button.on { background: #0F6E56; color: #fff; box-shadow: 0 2px 8px -2px rgba(15,110,86,.5); }
  .rev-seg-3 button.on { background: #0F6E56; }
  .rev-note { font-size: 12px; line-height: 1.5; color: #6a7a73; margin: 2px 0 0; }
  .rev-jumps { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
  .rev-jump {
    border: 1px solid #dde5e1; background: #fff; cursor: pointer; font-family: inherit;
    font-size: 12.5px; font-weight: 500; color: #41524b; padding: 10px 8px; border-radius: 10px; text-align: left; transition: .15s;
  }
  .rev-jump:hover { border-color: #b9ccc4; }
  .rev-jump.active { background: #e1eee9; border-color: #0F6E56; color: #0F6E56; }
  .rev-foot { font-size: 11.5px; line-height: 1.55; color: #84938c; margin: 0; }
  @media (max-width: 760px) { .rev { order: 2; width: 100%; max-width: 390px; } }
</style>
</head>
<body>

  </svg>
